interface:
  display_name: "Deals Scanner"
  short_description: "Daily deal scanning across credit cards, uscardforum, Rakuten, Slickdeals, and Dealmoon"
  default_prompt: "Use the deals-scanner skill with an explicit mode, source, and report date. If the scope is broad, produce a daily bundle with summary.md plus per-source references under ~/.oh-my-agent/reports/deals-scanner/daily/<date>/references/. Use source-specific daily windows by default: credit-cards/uscardforum/rakuten over the recent 3 days, slickdeals/dealmoon over the recent 7 days. The summary should read like a decision-ready morning brief, open with `简短结论：` in 2 short sentences, keep its main payload in Apply now / Buy now / Stack now with concrete deals and links, use Watchlist for carryover or low-confidence items, and include `各渠道快照` where each source gets one compact sentence describing the strongest current opportunity plus the main caveat. Call out each source's lookback window and whether it misses the 10-item high-confidence floor. Prefer deal-level links in the main body, use Dealmoon mainly for beauty/electronics/home, and keep Slickdeals broader across frontpage, tech, home, and other notable categories."
