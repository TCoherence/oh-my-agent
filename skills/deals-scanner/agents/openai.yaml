interface:
  display_name: "Deals Scanner"
  short_description: "Daily deal scanning across credit cards, uscardforum, Rakuten, Slickdeals, and Dealmoon"
  default_prompt: "Use the deals-scanner skill with an explicit mode, source, and report date. If the scope is broad, produce a daily bundle with summary.md plus per-source references under ~/.oh-my-agent/reports/deals-scanner/daily/<date>/references/. The summary should read like a morning brief and group items into Apply now / Buy now / Stack now / Watchlist, include concise source snapshots, and call out any source that misses the 10-item high-confidence floor. Prefer deal-level links in the main body, keep weaker candidates in lower_confidence_watchlist instead of padding, use Dealmoon mainly for beauty/electronics/home, and keep Slickdeals broader across frontpage, tech, home, and other notable categories."
