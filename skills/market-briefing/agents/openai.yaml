interface:
  display_name: "Market Briefing"
  short_description: "Persisted politics, finance, and AI daily/weekly briefings"
  default_prompt: "Use the market-briefing skill to produce a Chinese report with an explicit mode, domain, and report date. If the scope is ambiguous, propose politics / finance / ai daily or cross-domain weekly variants instead of silently defaulting to ai. For finance, default to China macro and policy, US macro and policy, and tracked holdings over the last 7 days. For AI, read the tracked people/community pool, use X.com as an early-signal layer with cross-checking, and record new candidates/promotions. Persist Markdown and JSON outputs under ~/.oh-my-agent/reports/market-briefing/ and include inline source links in the main body."
