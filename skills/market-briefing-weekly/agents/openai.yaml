interface:
  display_name: "Market Briefing — Weekly"
  short_description: "Persisted Chinese cross-domain weekly synthesis across politics / finance / AI"
  default_prompt: "Use the market-briefing-weekly skill to produce a Chinese cross-domain weekly synthesis with an explicit ISO week. Read the last 7 days of stored politics / finance / ai daily reports plus latest bootstrap dossiers and a bounded number of previous weekly reports. The finance weekly mainline must absorb US volatility, China/Hong Kong market pulse, China property-policy and financing signals, tracked-holdings developments, and broad-market implications. The AI weekly mainline must absorb frontier-lab radar, people/community signals, and five-layer developments. Persist Markdown and JSON outputs under ~/.oh-my-agent/reports/market-briefing/weekly/ and return a structured Chinese chat summary per the SKILL.md final-answer format."
