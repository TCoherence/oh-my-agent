interface:
  display_name: "Paper Digest"
  short_description: "Daily AI / robotics / systems paper radar from arXiv + HF Daily + Semantic Scholar"
  default_prompt: "Use the paper-digest skill to produce a Chinese daily paper radar for today. Fetch candidates with scripts/paper_fetch.py --source all, load the last 7 days of report context and the 14-day seen-pool, then scaffold and fill Markdown + JSON under ~/.oh-my-agent/reports/paper-digest/daily/<today>. Write Top picks (≤8, ranked), Watchlist category hits (≤4 per arXiv category), Extended reading via Semantic Scholar similar papers, and a bounded new-authors discovery sweep (1-3 or explicit 本日发现扫描未发现达标候选). Keep paper titles and author names in English, write one-sentence Chinese tldr per picked paper, and add inline source links in the main body. If any source fails, mark it in coverage_gaps / confidence_flags rather than abort. Persist with scripts/report_store.py persist — this auto-records the seen-pool. Stay orthogonal to market-briefing AI daily: this skill anchors on the paper / method / benchmark layer, not product announcements."
